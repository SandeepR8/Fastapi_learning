<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width={device-width}, initial-scale=1.0">
    <title>{% if title %}FastAPI - {{title}}{% endif %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</head>
<body> 
    <header class="site-header mb-3">
        <nav class="navbar navbar-expand-md bg-steel fixed-top bg-dark"
             data-bs-theme="dark">
            <div class="container">
                <a class="navbar-brand me-4" href="#">FastAPI Blog</a>
                <button class="navbar-toggler"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#navbarToggle"
                        aria-controls="navbarToggle"
                        aria-expanded="false"
                        aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarToggle">
                    <div class="navbar-nav me-auto">
                        <a class="nav-link active"
                           aria-current="page"
                           href="{{ url_for('home')}}">Home</a>
                    </div>
                    <!-- Navbar Right Side -->
                    <div class="navbar-nav">
                        <!-- Shown when logged in (hidden by default, shown via JS) -->
                        <div id="loggedInNav" class="d-none">
                            <button class="btn btn-outline-light mb-2 mb-md-0 me-md-2"
                                    type="button"
                                    data-bs-toggle="modal"
                                    data-bs-target="#createPostModal">New Post</button>
                            <a class="btn btn-light mb-2 mb-md-0 me-md-3"
                               href="#"
                               id="accountBtn">Account</a>
                        </div>
                        <!-- Shown when logged out -->
                        <div id="loggedOutNav">
                            <a class="btn btn-outline-light mb-2 mb-md-0 me-md-2"
                               href="#">Login</a>
                            <a class="btn btn-light mb-2 mb-md-0 me-md-3"
                               href="#">Register</a>
                        </div>
                        <div class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle"
                               href="#"
                               role="button"
                               id="bd-theme"
                               data-bs-toggle="dropdown"
                               aria-expanded="false">
                                <span id="bd-theme-text">🌗 Auto</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="bd-theme">
                                <li>
                                    <button class="dropdown-item" type="button" data-bs-theme-value="light">🌝 Light</button>
                                </li>
                                <li>
                                    <button class="dropdown-item" type="button" data-bs-theme-value="dark">🌚 Dark</button>
                                </li>
                                <li>
                                    <button class="dropdown-item" type="button" data-bs-theme-value="auto">🌗 Auto</button>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    {% block content %}
    {% endblock content %}
    
</body>
</html>

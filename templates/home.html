{% extends "layout.html" %}\
    {% block content %}

    <h2>Posts</h2>

    {% for post in posts %}
    <div class="d-flex p-5 bd-highlight">
    <div class="card fs-5" style="width: 50rem;text-align = center">
        <div class="card-body">
          <h5 class="card-title">{{post.title}}</h5>
          <h6 class="card-subtitle mb-2 text-muted">{{post.author}}</h6>
          <p class="card-text">{{post.content}}</p>
          <a href="#" class="card-link">{{post.date}}</a>
        </div>
      </div>
    </div>
    {% endfor %}
    {% endblock %}
